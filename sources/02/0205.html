      <tr>

        <td>3</td>
      </tr>
    </table>

  </form>
  <Hr>
  <h1>회원 가입을 환영합니다</h1>
  <div id="container">
    <h1>회원 가입을 환영합니다</h1>
    <form>
      <fieldset>
        <legend>사용자 정보</legend>
        <ul>
          <li>
            <label for="uid">아이디</label>
            <input type="text" id="uid" autofocus placeholder="4자 ~ 10자 사이,공백없이" required>
          </li>
          <li>
            <label for="pw">비밀번호</label>
            <input type="password" id="pw" autofocus placeholder="대소문자 포함 8자" required>
            <input type="submit" value="로그인">
          </li>
        </ul>
      </fieldset>
    </form>
  </div>
